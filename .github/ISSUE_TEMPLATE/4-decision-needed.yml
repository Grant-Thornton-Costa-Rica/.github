name: Decisión Requerida
description: Para decisiones que bloquean o afectan la dirección del proyecto
title: "[Decision]: "
labels: ["type: decision", "status: needs-decision"]
body:
  - type: textarea
    id: decision
    attributes:
      label: Decisión requerida
      description: ¿Qué necesita decidirse?
      placeholder: "Ejemplo: ¿Los precios de los cursos deberían contemplar descuentos en la fase 1?"
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Opciones
      placeholder: |
        Opción 1:
        Opción 2:
        Opción 3:
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Opción recomendada
      description: ¿Qué opción recomiendas y por qué?
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Responsable de la decisión
      description: ¿Quién debe tomar o coordinar la decisión?
      placeholder: "Ejemplo: @project-owner / Finanzas / Marketing"
    validations:
      required: true

  - type: input
    id: needed-by
    attributes:
      label: Necesaria para
      placeholder: "Ejemplo: 2026-06-20"
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impacto si se retrasa
      placeholder: "Ejemplo: El backend y el frontend no podrán finalizar el modelo de datos."
    validations:
      required: false