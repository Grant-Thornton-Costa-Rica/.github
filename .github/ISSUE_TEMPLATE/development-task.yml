name: Development Task
description: For coding, configuration, database, API, frontend, backend, or DevOps work
title: "[Dev]: "
labels: ["type: development"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What technical result should be achieved?
      placeholder: Example Create the backend endpoint to list active courses.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this needed?
      placeholder: Example The admin portal needs to show courses managed by Marketing.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What must be true for this task to be considered done?
      placeholder: |
        - [ ] Endpoint returns only active courses
        - [ ] Endpoint requires authentication
        - [ ] Response includes id, title, date, price, and modality
        - [ ] Tested in QA
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Database
        - DevOps
        - QA Automation
        - Other
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner
      placeholder: Example @developer
    validations:
      required: true

  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      placeholder: Example @tech-lead
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      placeholder: Example Needs database model approved first.
    validations:
      required: false