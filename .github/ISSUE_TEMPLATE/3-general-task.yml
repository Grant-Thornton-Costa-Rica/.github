name: Tarea General
description: Para tareas no técnicas o mixtas del proyecto
title: "[Task]: "
labels: ["type: task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Objetivo
      description: ¿Qué se debe lograr?
      placeholder: "Ejemplo: Preparar la lista aprobada de categorías de cursos."
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Resultado esperado
      description: ¿Qué debe existir cuando esto esté terminado?
      placeholder: "Ejemplo: Un documento u hoja de cálculo con las categorías finales aprobadas."
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Responsable
      description: ¿Quién es responsable de avanzar en esto?
      placeholder: "Ejemplo: Equipo de Marketing / @usuario"
    validations:
      required: true

  - type: input
    id: reviewer
    attributes:
      label: Revisor o aprobador
      description: ¿Quién confirma que está completo?
      placeholder: "Ejemplo: @project-lead"
    validations:
      required: false

  - type: input
    id: due-date
    attributes:
      label: Fecha límite
      description: ¿Para cuándo se necesita?
      placeholder: "Ejemplo: 2026-06-20"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notas / enlaces
      description: Agrega cualquier contexto adicional, documentos, capturas de pantalla o referencias.
    validations:
      required: false