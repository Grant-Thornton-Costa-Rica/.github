name: Decision Needed
description: For choices that block or affect project direction
title: "[Decision]: "
labels: ["type: decision", "status: needs-decision"]
body:
  - type: textarea
    id: decision
    attributes:
      label: Decision needed
      description: What needs to be decided?
      placeholder: Example Should course prices support discounts in phase 1?
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options
      placeholder: |
        Option 1:
        Option 2:
        Option 3:
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Recommended option
      description: What option do you recommend and why?
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Decision owner
      description: Who must make or coordinate the decision?
      placeholder: Example @project-owner / Finance / Marketing
    validations:
      required: true

  - type: input
    id: needed-by
    attributes:
      label: Needed by
      placeholder: Example 2026-06-20
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact if delayed
      placeholder: Example Backend and frontend cannot finalize the data model.
    validations:
      required: false