name: Tarea de Desarrollo
description: Para trabajo de codificación, configuración, base de datos, API, frontend, backend o DevOps
title: "[Dev]: "
labels: ["type: development"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Objetivo
      description: ¿Qué resultado técnico se debe alcanzar?
      placeholder: "Ejemplo: Crear el endpoint de backend para listar los cursos activos."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: ¿Por qué es necesario?
      placeholder: "Ejemplo: El portal de administración necesita mostrar los cursos gestionados por Marketing."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Criterios de aceptación
      description: ¿Qué debe cumplirse para que esta tarea se considere completada?
      placeholder: |
        - [ ] El endpoint retorna solo cursos activos
        - [ ] El endpoint requiere autenticación
        - [ ] La respuesta incluye id, título, fecha, precio y modalidad
        - [ ] Probado en QA
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Frontend
        - Backend
        - Base de datos
        - DevOps
        - QA Automation
        - Otro
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Responsable
      placeholder: "Ejemplo: @desarrollador"
    validations:
      required: true

  - type: input
    id: reviewer
    attributes:
      label: Revisor
      placeholder: "Ejemplo: @tech-lead"
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencias / bloqueos
      placeholder: "Ejemplo: Requiere que el modelo de base de datos sea aprobado primero."
    validations:
      required: false